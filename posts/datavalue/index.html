<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Value</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .embed-wrap {
        height: 100%;
      }

      .embed-frame {
        border: 0;
        width: 100%;
        height: 100vh;
      }

      .fallback {
        font-family: "Helvetica Neue", Arial, sans-serif;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <div class="embed-wrap">
      <iframe
        class="embed-frame"
        src="/blog/posts/metagrads/"
        title="Metagradients blog post"
        loading="lazy"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>
    <noscript>
      <div class="fallback">
        JavaScript is disabled. View the post at
        <a href="/blog/posts/metagrads/">/blog/posts/metagrads/</a>.
      </div>
    </noscript>
  </body>
</html>
